name: publish artifacts
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            js-files: true
          - host: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            packages: gcc-aarch64-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
    name: build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-10-25
          targets: ${{ matrix.settings.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: install packages
        if: ${{ matrix.settings.packages }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.settings.packages }}
      - name: napi build
        run: yarn install && yarn build --target ${{ matrix.settings.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ./*.node
          if-no-files-found: error
      - name: upload js files
        if: ${{ matrix.settings.js-files }}
        uses: actions/upload-artifact@v4
        with:
          name: js-files
          if-no-files-found: error
          path: |
            index.js
            index.d.ts
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: display artifacts
        run: ls -R artifacts
      - name: pack platform tarballs
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p tarballs
          for dir in npm/*/; do
            PKG_JSON="$dir/package.json"
            # inject version from git tag
            jq --arg v "$VERSION" '.version = $v' "$PKG_JSON" > "$PKG_JSON.tmp" && mv "$PKG_JSON.tmp" "$PKG_JSON"
            # find matching .node binary
            BINARY=$(jq -r .main "$PKG_JSON")
            if [ -f "artifacts/$BINARY" ]; then
              cp "artifacts/$BINARY" "$dir/"
              (cd "$dir" && npm pack --pack-destination ../../tarballs)
            fi
          done
          ls tarballs/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
            tarballs/*.tgz
          generate_release_notes: true
